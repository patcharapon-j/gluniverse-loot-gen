name: Release

# Manual-trigger release. Actions tab → Release → "Run workflow".
# Pick a bump (patch / minor / major) and the version is auto-incremented from
# module.json, committed back to the branch, then published as a GitHub Release
# with module.json + module.zip as assets — so the "latest" manifest link always
# resolves to it and others can install via manifest URL:
#   https://github.com/<owner>/<repo>/releases/latest/download/module.json

on:
  workflow_dispatch:
    inputs:
      bump:
        description: "Semver bump (ignored if an explicit version is given)"
        type: choice
        options: [patch, minor, major]
        default: patch
      version:
        description: "Explicit version, e.g. 0.2.0 (overrides bump; blank = auto-increment)"
        required: false
        type: string
      prerelease:
        description: "Mark this release as a pre-release"
        required: false
        type: boolean
        default: false

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.ref_name }}

      - name: Resolve version
        id: ver
        env:
          BUMP: ${{ inputs.bump }}
          EXPLICIT: ${{ inputs.version }}
        run: |
          CURRENT="$(jq -r '.version // "0.0.0"' module.json)"
          if [ -n "$EXPLICIT" ]; then
            VERSION="$EXPLICIT"
          else
            BASE="${CURRENT%%-*}"            # drop any -prerelease suffix before bumping
            IFS='.' read -r MAJ MIN PAT <<< "$BASE"
            MAJ=${MAJ:-0}; MIN=${MIN:-0}; PAT=${PAT:-0}
            case "$BUMP" in
              major) MAJ=$((MAJ + 1)); MIN=0; PAT=0 ;;
              minor) MIN=$((MIN + 1)); PAT=0 ;;
              patch|*) PAT=$((PAT + 1)) ;;
            esac
            VERSION="$MAJ.$MIN.$PAT"
          fi
          if ! echo "$VERSION" | grep -Eq '^[0-9]+\.[0-9]+\.[0-9]+([-.+].*)?$'; then
            echo "::error::Resolved version '$VERSION' is not valid semver."
            exit 1
          fi
          echo "current=$CURRENT" >> "$GITHUB_OUTPUT"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=v$VERSION"    >> "$GITHUB_OUTPUT"
          echo "Bump '$BUMP': $CURRENT -> $VERSION"

      - name: Stamp module.json (version + manifest/download URLs)
        env:
          VERSION: ${{ steps.ver.outputs.version }}
          REPO: ${{ github.repository }}
        run: |
          BASE="https://github.com/${REPO}"
          tmp="$(mktemp)"
          jq \
            --arg v "$VERSION" \
            --arg url "$BASE" \
            --arg manifest "$BASE/releases/latest/download/module.json" \
            --arg download "$BASE/releases/download/v$VERSION/module.zip" \
            '.version = $v | .url = $url | .manifest = $manifest | .download = $download' \
            module.json > "$tmp" && mv "$tmp" module.json
          echo "----- stamped module.json -----"
          cat module.json

      - name: Commit version bump back to branch
        env:
          VERSION: ${{ steps.ver.outputs.version }}
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add module.json
          if git diff --cached --quiet; then
            echo "module.json unchanged — nothing to commit."
          else
            git commit -m "chore(release): v$VERSION"
            git push origin "HEAD:${{ github.ref_name }}"
          fi

      - name: Build module.zip
        run: |
          # module.json must sit at the zip root for Foundry to install it.
          zip -r module.zip . \
            -x ".git/*" ".github/*" "module.zip" "*.DS_Store"
          echo "----- zip contents -----"
          unzip -l module.zip

      - name: Publish GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ steps.ver.outputs.tag }}
          PRERELEASE: ${{ inputs.prerelease }}
        run: |
          # Idempotent: replace any existing release/tag for this version.
          gh release delete "$TAG" --yes || true
          git push origin ":refs/tags/$TAG" || true
          git tag -f "$TAG"
          git push origin "refs/tags/$TAG"

          MANIFEST="https://github.com/${{ github.repository }}/releases/latest/download/module.json"
          {
            echo "Automated release **$TAG**."
            echo ""
            echo "Install / update in Foundry via the manifest link:"
            echo ""
            echo "\`$MANIFEST\`"
          } > release-notes.md

          FLAGS=""
          if [ "$PRERELEASE" = "true" ]; then FLAGS="--prerelease"; fi

          gh release create "$TAG" module.json module.zip \
            --title "$TAG" \
            --notes-file release-notes.md \
            $FLAGS
