# nginx snippet — expose the sidecar same-origin under your Foundry domain
# (DESIGN §14). Paste this `location` block INTO the existing `server { … }`
# that already proxies Foundry, so it inherits your TLS + domain. Then:
#   sudo nginx -t && sudo systemctl reload nginx
#
# Result: the browser calls https://<your-foundry-domain>/gllg-sidecar/flavor,
# which nginx forwards to the loopback-only sidecar. The module's
# "Flavor Sidecar URL" setting should be exactly:  /gllg-sidecar

location /gllg-sidecar/ {
    proxy_pass http://127.0.0.1:7878/;

    proxy_http_version 1.1;
    proxy_set_header Host              $host;
    proxy_set_header X-Real-IP         $remote_addr;
    proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    # claude can take a while — especially a multi-item workshop batch, which the
    # sidecar times out per item. Keep this >= the sidecar's GLLG_MAX_TIMEOUT_MS
    # (default 240s) so nginx never cuts off a request the sidecar would answer
    # (a premature cut surfaces in the module as a 502).
    proxy_read_timeout 300s;
    proxy_send_timeout 300s;

    # Flavor batches are small; keep a sane body cap.
    client_max_body_size 512k;
}
